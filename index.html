<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title id="pageTitle">Page login test</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase v9 compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="container">
    <h1>🛒 Liste de courses Firebase</h1>

    <!-- Formulaire d'auth -->
    <div id="auth" class="card">
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Mot de passe">
      <div class="buttons">
        <button onclick="signup()">S’inscrire</button>
        <button onclick="login()">Se connecter</button>
      </div>
    </div>

    <!-- Page utilisateur -->
    <div id="welcome" class="card" style="display:none;">
      <h2>Bienvenue <span id="user"></span> !</h2>
      <button class="logout" onclick="logout()">Déconnexion</button>

      <h3>Ajouter un item :</h3>
      <div class="add-item">
        <input id="item" type="text" placeholder="Ex: Lait">
        <button onclick="addItem()">Ajouter</button>
      </div>

      <h3>Votre liste :</h3>
      <ul id="shoppingList" class="shopping-list"></ul>
    </div>
  </div>

  <script>
    // 🔹 Config Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyB1ZAPhOMsc9DhFTiZX1RGrQxhu5DqUN0o",
      authDomain: "page-login-11744.firebaseapp.com",
      projectId: "page-login-11744",
      storageBucket: "page-login-11744.firebasestorage.app",
      messagingSenderId: "418934428800",
      appId: "1:418934428800:web:f98bb98372f3fd65d50265"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // 🔹 SIGNUP
    function signup() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.createUserWithEmailAndPassword(email, password)
        .then(userCredential => {
          const user = userCredential.user;
          db.collection("default").doc(user.uid).set({
            email: user.email,
            created: firebase.firestore.FieldValue.serverTimestamp()
          })
          .then(() => showWelcome(user))
          .catch(err => alert("Erreur Firestore: " + err.message));
        })
        .catch(err => alert("Erreur Auth: " + err.message));
    }

    // 🔹 LOGIN
    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then(userCredential => showWelcome(userCredential.user))
        .catch(err => alert(err.message));
    }

    // 🔹 LOGOUT
    function logout() {
      auth.signOut();
      document.getElementById("auth").style.display = "block";
      document.getElementById("welcome").style.display = "none";
      document.getElementById("shoppingList").innerHTML = "";
      document.getElementById("pageTitle").innerText = "Page login test";
    }

    // 🔹 SHOW WELCOME
    function showWelcome(user) {
      document.getElementById("user").innerText = user.email;
      document.getElementById("auth").style.display = "none";
      document.getElementById("welcome").style.display = "block";
      document.getElementById("pageTitle").innerText = `Page login test – Bienvenue ${user.email}`;
      loadItems(user.uid);
    }

    // 🔹 ADD ITEM
    function addItem() {
      const itemText = document.getElementById("item").value;
      const user = auth.currentUser;
      if (!itemText || !user) return;

      db.collection("default").doc(user.uid).collection("shoppingList")
        .add({
          name: itemText,
          created: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(() => {
          document.getElementById("item").value = "";
          loadItems(user.uid);
        });
    }

    // 🔹 LOAD ITEMS
    function loadItems(uid) {
      const listEl = document.getElementById("shoppingList");
      listEl.innerHTML = "";

      db.collection("default").doc(uid).collection("shoppingList")
        .orderBy("created")
        .get()
        .then(snapshot => {
          snapshot.docs.forEach(doc => {
            const li = document.createElement("li");
            li.textContent = doc.data().name;
            listEl.appendChild(li);
          });
        });
    }

    // 🔹 SESSION PERSIST
    auth.onAuthStateChanged(user => {
      if (user) showWelcome(user);
      else document.getElementById("pageTitle").innerText = "Page login test";
    });
  </script>
</body>
</html>
